# M5b ablation 2: full 42K with ordinal-magnitude-weighted BT.
# PROJECT_PLAN.md s3.2 / decision-log 2026-05-26. Hypothesis: magnitude
# weighting (parsed from naturalness_annotation, e.g. ["B+2","B+1"] -> w=1.5)
# recovers most of the high-consensus filter's denoising effect without
# throwing away ~11K training pairs.

run_name: natscore-small-v0-magnitude
seed: 42
batch_size: 16
epochs: 5
checkpoint_every_steps: 500
log_every_steps: 25
output_dir: /kaggle/working/outputs
wandb_project: natscore
wandb_enabled: true

model:
  n_hidden_states: 13
  hidden_dim: 768
  pooler_bottleneck_dim: 256
  score_bottleneck_dim: 256
  dropout: 0.1
  init_layer_weights: uniform
  frozen_layer_idx: null

data:
  cache_dir: ""
  splits: ["train"]
  high_consensus_only: false
  magnitude_weighting: true       # <-- the only change vs baseline
  subset_filter: null
  drop_pairs_missing_side: true
  num_workers: 0

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  grad_clip: 1.0
  warmup_steps: 500
  scheduler: cosine
