# Default Kaggle T4 / P100 training config. The four M5b ablations
# (high_consensus, magnitude, regular_only, layer_probe_L6) inherit from this
# via the ablation notebook -- override only the fields that differ.

run_name: natscore-small-v0-kaggle
seed: 42
batch_size: 16
epochs: 5
max_steps: null
eval_every_steps: 0
checkpoint_every_steps: 500
log_every_steps: 25
output_dir: /kaggle/working/outputs
wandb_project: natscore
wandb_entity: null
wandb_enabled: true

model:
  n_hidden_states: 13
  hidden_dim: 768
  pooler_bottleneck_dim: 256
  score_bottleneck_dim: 256
  dropout: 0.1
  init_layer_weights: uniform
  frozen_layer_idx: null

data:
  cache_dir: ""               # unused by OnlineTrainer
  splits: ["train"]
  high_consensus_only: false
  magnitude_weighting: false
  subset_filter: null
  drop_pairs_missing_side: true
  num_workers: 0

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  grad_clip: 1.0
  warmup_steps: 500
  scheduler: cosine
