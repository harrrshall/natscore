# Default training config for the NatScore head (PROJECT_PLAN.md s8 M3).
# Targets the 500-pair dev-iteration cache (s6.1.1). For the full ~42K
# train run we'll swap data.cache_dir to the Kaggle persistent cache.

run_name: natscore-small-v0
seed: 42
batch_size: 8
epochs: 5
max_steps: null
eval_every_steps: 0
checkpoint_every_steps: 500
log_every_steps: 10
output_dir: outputs
wandb_project: natscore
wandb_entity: null
wandb_enabled: true

model:
  n_hidden_states: 13
  hidden_dim: 768
  pooler_bottleneck_dim: 256
  score_bottleneck_dim: 256
  dropout: 0.0
  init_layer_weights: uniform

data:
  cache_dir: cache/whisper_small_500
  splits: ["train"]
  high_consensus_only: false
  magnitude_weighting: false
  drop_pairs_missing_side: true
  num_workers: 0

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  grad_clip: 1.0
  warmup_steps: 100
  scheduler: cosine
